<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Empleado por horas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f6f7fb; color: #252a34; }
        .form-shell { max-width: 820px; }
        .panel { border: 1px solid #dde2ef; border-radius: 8px; background: #fff; }
        .panel-head { border-left: 5px solid #0f8b8d; }
        .section-label { color: #0f8b8d; font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; }
        .btn-main { background: #0f8b8d; border-color: #0f8b8d; color: #fff; }
        .btn-main:hover { background: #0c7375; border-color: #0c7375; color: #fff; }
    </style>
</head>
<body>
    <main class="container py-5">
        <section class="form-shell mx-auto">
            <div class="mb-4">
                <p class="section-label mb-2">Control de personal</p>
                <h1 class="h3 mb-1">Empleado por horas</h1>
                <p class="text-secondary mb-0">Registro de empleado con horas trabajadas y pago por hora.</p>
            </div>

            <div class="panel shadow-sm">
                <div class="panel-head px-4 py-3">
                    <h2 class="h5 mb-0">Informacion de pago por horas</h2>
                </div>

                <div class="p-4">
                    <form action="objetos/objetoEmpleadoPorHoras.php" method="post">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="txt_codigoEmpleado" class="form-label">Codigo empleado</label>
                                <input type="text" class="form-control" id="txt_codigoEmpleado" name="txt_codigoEmpleado" placeholder="Ejemplo: E001">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="txt_nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="txt_nombre" name="txt_nombre" placeholder="Ejemplo: Ana Lopez">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="txt_puesto" class="form-label">Puesto</label>
                                <input type="text" class="form-control" id="txt_puesto" name="txt_puesto" placeholder="Ejemplo: Operador">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="num_sueldoBase" class="form-label">Sueldo base</label>
                                <input type="number" class="form-control" id="num_sueldoBase" name="num_sueldoBase" placeholder="Ejemplo: 2500.00" step="0.01" min="0">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="num_horasTrabajadas" class="form-label">Horas trabajadas</label>
                                <input type="number" class="form-control" id="num_horasTrabajadas" name="num_horasTrabajadas" placeholder="Ejemplo: 40" min="0">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="num_pagoPorHora" class="form-label">Pago por hora</label>
                                <input type="number" class="form-control" id="num_pagoPorHora" name="num_pagoPorHora" placeholder="Ejemplo: 35.00" step="0.01" min="0">
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-end mt-4">
                            <button type="reset" class="btn btn-outline-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-main">Guardar empleado</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
