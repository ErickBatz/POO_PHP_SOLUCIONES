<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Cuenta Bancaria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f3f7f7; color: #1f2d2d; }
        .form-shell { max-width: 720px; }
        .panel { border: 1px solid #d7e3e1; border-radius: 8px; background: #fff; }
        .panel-head { border-bottom: 3px solid #0f766e; }
        .section-label { color: #0f766e; font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; }
        .btn-main { background: #0f766e; border-color: #0f766e; color: #fff; }
        .btn-main:hover { background: #0c605a; border-color: #0c605a; color: #fff; }
    </style>
</head>
<body>
    <main class="container py-5">
        <section class="form-shell mx-auto">
            <div class="mb-4">
                <p class="section-label mb-2">Sistema bancario</p>
                <h1 class="h3 mb-1">Registro de cuenta bancaria</h1>
                <p class="text-secondary mb-0">Datos base de la cuenta y su saldo inicial.</p>
            </div>

            <div class="panel shadow-sm">
                <div class="panel-head px-4 py-3">
                    <h2 class="h5 mb-0">Datos de la cuenta</h2>
                </div>

                <div class="p-4">
                    <form action="objetos/objetoCuentaBancaria.php" method="POST">
                        <div class="mb-3">
                            <label for="num_numeroCuenta" class="form-label">Numero de cuenta</label>
                            <input type="number" class="form-control" id="num_numeroCuenta" name="num_numeroCuenta" required>
                        </div>

                        <div class="mb-3">
                            <label for="txt_titular" class="form-label">Titular</label>
                            <input type="text" class="form-control" id="txt_titular" name="txt_titular" required>
                        </div>

                        <div class="mb-4">
                            <label for="num_saldo" class="form-label">Saldo</label>
                            <input type="number" class="form-control" id="num_saldo" name="num_saldo" min="0" step="0.01" required>
                        </div>

                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-end">
                            <button type="reset" class="btn btn-outline-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-main">Guardar cuenta</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
