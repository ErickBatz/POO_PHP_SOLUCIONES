<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Cuenta Bancaria</title>
</head>
<body>
    <h1>Registro de Cuenta Bancaria</h1>

    <form action="objetos/objetoCuentaBancaria.php" method="POST">
        <label for="num_numeroCuenta">Numero de cuenta:</label>
        <input type="number" id="num_numeroCuenta" name="num_numeroCuenta" required>
        <br><br>

        <label for="txt_titular">Titular:</label>
        <input type="text" id="txt_titular" name="txt_titular" required>
        <br><br>

        <label for="num_saldo">Saldo:</label>
        <input type="number" id="num_saldo" name="num_saldo" min="0" step="0.01" required>
        <br><br>

        <button type="submit">Guardar cuenta</button>
        <button type="reset">Limpiar</button>
    </form>
</body>
</html>
