<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventario de productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7f6; color: #24312d; }
        .form-shell { max-width: 760px; }
        .panel { border: 1px solid #dfe8e3; border-radius: 8px; background: #fff; }
        .panel-head { border-bottom: 3px solid #2f6f4e; }
        .section-label { color: #2f6f4e; font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; }
        .btn-main { background: #2f6f4e; border-color: #2f6f4e; color: #fff; }
        .btn-main:hover { background: #285d43; border-color: #285d43; color: #fff; }
    </style>
</head>
<body>
    <main class="container py-5">
        <section class="form-shell mx-auto">
            <div class="mb-4">
                <p class="section-label mb-2">Sistema de productos</p>
                <h1 class="h3 mb-1">Inventario de productos</h1>
                <p class="text-secondary mb-0">Registro basico para codigo, precio y existencia.</p>
            </div>

            <div class="panel shadow-sm">
                <div class="panel-head px-4 py-3">
                    <h2 class="h5 mb-0">Datos del producto</h2>
                </div>

                <div class="p-4">
                    <form action="objetoProducto.php" method="post">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="codigo" class="form-label">Codigo</label>
                                <input type="text" class="form-control" id="codigo" name="codigo" placeholder="Ejemplo: P001">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="nombre" class="form-label">Nombre del producto</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ejemplo: Teclado">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="precio" class="form-label">Precio</label>
                                <input type="number" class="form-control" id="precio" name="precio" placeholder="Ejemplo: 150.00" step="0.01" min="0">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="existencia" class="form-label">Existencia</label>
                                <input type="number" class="form-control" id="existencia" name="existencia" placeholder="Ejemplo: 25" min="0">
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-end mt-4">
                            <button type="reset" class="btn btn-outline-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-main">Ver inventario</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
