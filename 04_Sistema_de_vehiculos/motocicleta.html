<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Motocicleta</title>
</head>
<body>
    <h1>Registro de Motocicleta</h1>

    <form action="objetos/objetoMotocicleta.php" method="POST">
        <label for="txt_placa">Placa:</label>
        <input type="text" id="txt_placa" name="txt_placa" required>
        <br><br>

        <label for="txt_marca">Marca:</label>
        <input type="text" id="txt_marca" name="txt_marca" required>
        <br><br>

        <label for="num_modelo">Modelo (a&ntilde;o):</label>
        <input type="number" id="num_modelo" name="num_modelo" min="1900" max="2100" required>
        <br><br>

        <label for="num_precio">Precio:</label>
        <input type="number" id="num_precio" name="num_precio" min="0" step="0.01" required>
        <br><br>

        <label for="num_cilindrada">Cilindrada:</label>
        <input type="number" id="num_cilindrada" name="num_cilindrada" min="0" required>
        <br><br>

        <label for="txt_tipoMoto">Tipo de moto:</label>
        <input type="text" id="txt_tipoMoto" name="txt_tipoMoto" placeholder="scooter, naked, deportiva, cruiser" required>
        <br><br>

        <button type="submit">Guardar motocicleta</button>
        <button type="reset">Limpiar</button>
    </form>
</body>
</html>
