<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Automovil</title>
</head>
<body>
    <h1>Registro de Automovil</h1>

    <form action="objetos/objetoAutomovil.php" method="POST">
        <label for="txt_placa">Placa:</label>
        <input type="text" id="txt_placa" name="txt_placa" required>
        <br><br>

        <label for="txt_marca">Marca:</label>
        <input type="text" id="txt_marca" name="txt_marca" required>
        <br><br>

        <label for="num_modelo">Modelo (a&ntilde;o):</label>
        <input type="number" id="num_modelo" name="num_modelo" min="1900" max="2100" required>
        <br><br>

        <label for="num_precio">Precio:</label>
        <input type="number" id="num_precio" name="num_precio" min="0" step="0.01" required>
        <br><br>

        <label for="txt_tipoVehiculo">Tipo de vehiculo:</label>
        <input type="text" id="txt_tipoVehiculo" name="txt_tipoVehiculo" required>
        <br><br>

        <label for="num_numeroPuertas">Numero de puertas:</label>
        <input type="number" id="num_numeroPuertas" name="num_numeroPuertas" min="1" required>
        <br><br>

        <label for="txt_tipoCombustible">Tipo de combustible:</label>
        <input type="text" id="txt_tipoCombustible" name="txt_tipoCombustible" required>
        <br><br>

        <button type="submit">Guardar automovil</button>
        <button type="reset">Limpiar</button>
    </form>
</body>
</html>
