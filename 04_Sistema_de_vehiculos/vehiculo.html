<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Vehiculos</title>
</head>
<body>
    <h1>Registro de Vehiculo</h1>

    <form action="objetos/objetoVehiculo.php" method="POST">
        <label for="placa">Placa:</label>
        <input type="text" id="txt_placa" name="txt_placa" required>
        <br><br>

        <label for="marca">Marca:</label>
        <input type="text" id="txt_marca" name="txt_marca" required>
        <br><br>

        <label for="modelo">Modelo (a&ntilde;o):</label>
        <input type="number" id="num_modelo" name="num_modelo" min="1900" max="2100" required>
        <br><br>

        <label for="precio">Precio:</label>
        <input type="number" id="num_precio" name="num_precio" min="0" step="0.01" required>
        <br><br>

        <button type="submit">Guardar vehiculo</button>
        <button type="reset">Limpiar</button>
    </form>
</body>
</html>
