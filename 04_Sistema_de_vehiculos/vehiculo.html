<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Vehiculos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f8; color: #20262d; }
        .form-shell { max-width: 760px; }
        .panel { border: 1px solid #d9e0e7; border-radius: 8px; background: #fff; }
        .panel-head { border-top: 4px solid #34495e; }
        .section-label { color: #34495e; font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; }
        .btn-main { background: #34495e; border-color: #34495e; color: #fff; }
        .btn-main:hover { background: #2b3d4f; border-color: #2b3d4f; color: #fff; }
    </style>
</head>
<body>
    <main class="container py-5">
        <section class="form-shell mx-auto">
            <div class="mb-4">
                <p class="section-label mb-2">Sistema de vehiculos</p>
                <h1 class="h3 mb-1">Registro de vehiculo</h1>
                <p class="text-secondary mb-0">Datos generales del vehiculo.</p>
            </div>

            <div class="panel shadow-sm">
                <div class="panel-head px-4 py-3">
                    <h2 class="h5 mb-0">Ficha del vehiculo</h2>
                </div>

                <div class="p-4">
                    <form action="objetos/objetoVehiculo.php" method="POST">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="txt_placa" class="form-label">Placa</label>
                                <input type="text" class="form-control" id="txt_placa" name="txt_placa" required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="txt_marca" class="form-label">Marca</label>
                                <input type="text" class="form-control" id="txt_marca" name="txt_marca" required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="num_modelo" class="form-label">Modelo (anio)</label>
                                <input type="number" class="form-control" id="num_modelo" name="num_modelo" min="1900" max="2100" required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="num_precio" class="form-label">Precio</label>
                                <input type="number" class="form-control" id="num_precio" name="num_precio" min="0" step="0.01" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-end mt-4">
                            <button type="reset" class="btn btn-outline-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-main">Guardar vehiculo</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
