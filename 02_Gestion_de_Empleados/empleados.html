<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestion de empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f7f6f2; color: #2d2f33; }
        .form-shell { max-width: 720px; }
        .panel { border: 1px solid #e2ded2; border-radius: 8px; background: #fff; }
        .panel-head { border-left: 5px solid #b7791f; }
        .section-label { color: #b7791f; font-size: .78rem; letter-spacing: .08em; text-transform: uppercase; }
        .btn-main { background: #b7791f; border-color: #b7791f; color: #fff; }
        .btn-main:hover { background: #966319; border-color: #966319; color: #fff; }
    </style>
</head>
<body>
    <main class="container py-5">
        <section class="form-shell mx-auto">
            <div class="mb-4">
                <p class="section-label mb-2">Gestion de empleados</p>
                <h1 class="h3 mb-1">Inventario de empleados</h1>
                <p class="text-secondary mb-0">Control de puesto, horas y pago por hora.</p>
            </div>

            <div class="panel shadow-sm">
                <div class="panel-head px-4 py-3">
                    <h2 class="h5 mb-0">Datos del empleado</h2>
                </div>

                <div class="p-4">
                    <form action="objetoEmpleado.php" method="post">
                        <div class="mb-3">
                            <label for="txt_nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="txt_nombre" name="txt_nombre" placeholder="Ejemplo: Ana Lopez">
                        </div>

                        <div class="mb-3">
                            <label for="txt_puesto" class="form-label">Puesto</label>
                            <input type="text" class="form-control" id="txt_puesto" name="txt_puesto" placeholder="Ejemplo: Cajero">
                        </div>

                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="num_horasTrabajadas" class="form-label">Horas trabajadas</label>
                                <input type="number" class="form-control" id="num_horasTrabajadas" name="num_horasTrabajadas" placeholder="Ejemplo: 40" min="0">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="num_pagoPorHora" class="form-label">Pago por hora</label>
                                <input type="number" class="form-control" id="num_pagoPorHora" name="num_pagoPorHora" placeholder="Ejemplo: 25.00" step="0.01" min="0">
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-end mt-4">
                            <button type="reset" class="btn btn-outline-secondary">Limpiar</button>
                            <button type="submit" class="btn btn-main">Guardar empleado</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
