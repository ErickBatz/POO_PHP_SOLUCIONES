<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestion de empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h1 class="h4 mb-0">Inventario de empleados</h1>
                    </div>

                    <div class="card-body">
                        <form action="objetoEmpleado.php" method="post">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="txt_nombre" name="txt_nombre" placeholder="Ejemplo: Ana Lopez">
                            </div>

                            <div class="mb-3">
                                <label for="puesto" class="form-label">Puesto</label>
                                <input type="text" class="form-control" id="txt_puesto" name="txt_puesto" placeholder="Ejemplo: Cajero">
                            </div>

                            <div class="mb-3">
                                <label for="horasTrabajadas" class="form-label">Horas trabajadas</label>
                                <input type="number" class="form-control" id="num_horasTrabajadas" name="num_horasTrabajadas" placeholder="Ejemplo: 40" min="0">
                            </div>

                            <div class="mb-4">
                                <label for="pagoPorHora" class="form-label">Pago por hora</label>
                                <input type="number" class="form-control" id="num_pagoPorHora" name="num_pagoPorHora" placeholder="Ejemplo: 25.00" step="0.01" min="0">
                            </div>

                            <div class="d-grid gap-2 d-sm-flex justify-content-sm-end">
                                <button type="reset" class="btn btn-outline-secondary">Limpiar</button>
                                <button type="submit" class="btn btn-success">Guardar empleado</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
